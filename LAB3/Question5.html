<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Map with Shapes</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .shapes {
        background: #f0f0f0;
        width: 600px;
        height: 300px;
        position: relative;
      }
      .shapes img {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div class="shapes">
      <img src="Figures.png" usemap="#shapes-map" alt="Shapes" />
      <map name="shapes-map">
        <area
          shape="circle"
          coords="250,250,50"
          href="../LAB3/circle.html"
          alt="Circle"
        />
        <area
          shape="tri"
          coords="300,100,350,150,300,200"
          href="../LAB3/triangle.html"
          alt="Polygon"
        />
        <area
          shape="rect"
          coords="400,100,550,200"
          href="../LAB3/square.html"
          alt="Square"
        />
        <area
          shape="poly"
          coords="150,150,200,200,150,100"
          href="../LAB3/polygon.html"
          alt="Triangle"
        />
      </map>
    </div>
  </body>
</html>
